<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phoo Pyae Sone ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}


body{

height:100vh;
overflow:hidden;

background:
radial-gradient(circle at top,#5b247a,#090014 70%);

color:white;

}


/* Stars */

.star{

position:absolute;

width:3px;
height:3px;

background:white;

border-radius:50%;

animation:blink 2s infinite;

}


@keyframes blink{

50%{
opacity:.2;
}

}


/* Container */

.container{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

}


/* Card */

.card{

width:90%;

max-width:430px;

padding:30px;

border-radius:30px;


background:
rgba(255,255,255,.08);


backdrop-filter:blur(15px);


box-shadow:

0 0 40px #ff4da6;


animation:show 1.5s;

}



@keyframes show{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

}

}


/* Couple Photo */

.couple-box{

position:relative;

display:flex;

justify-content:center;

align-items:center;

margin-bottom:30px;

}


/* Rotating Love Ring */

.couple-box::before{

content:"";

position:absolute;

width:250px;

height:250px;

border-radius:50%;

border:2px solid #ff8bd8;

box-shadow:

0 0 20px pink,
0 0 60px hotpink;

animation:ring 6s linear infinite;

}


@keyframes ring{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}


/* Premium Couple Photo */

.couple-box{

position:relative;
display:flex;
justify-content:center;
align-items:center;

margin-bottom:30px;

}


/* Heart Ring */

.couple-box::before{

content:"";

position:absolute;

width:250px;
height:250px;

border-radius:50%;

border:2px solid #ff8bd8;

box-shadow:

0 0 20px pink,
0 0 50px hotpink;

animation:rotateRing 6s linear infinite;

}


@keyframes rotateRing{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}



.couple-img{

width:220px;

height:220px;

object-fit:cover;

border-radius:50%;


border:6px solid white;


box-shadow:

0 0 30px #ff8bd8,
0 0 80px #ff4da6;


animation:

float 3s infinite,
glow 2s infinite;


transition:.5s;

z-index:2;

}


.couple-img:hover{

transform:scale(1.12);

}



@keyframes glow{

50%{

box-shadow:

0 0 50px white,
0 0 100px hotpink;

}

}
photoGlow 2s infinite;


transition:.5s;

z-index:2;

}



.couple-img:hover{

transform:scale(1.12);

}



@keyframes photoGlow{


50%{

box-shadow:

0 0 40px white,
0 0 80px hotpink;

}


}

width:220px;

height:220px;

object-fit:cover;

border-radius:50%;


border:5px solid #ff8bd8;


box-shadow:

0 0 30px pink;


animation:float 3s infinite;

}



@keyframes float{

50%{

transform:translateY(-15px);

}

}



.heart-circle{

position:absolute;

right:70px;

bottom:0;

font-size:35px;

}



/* Title */

h1{

font-size:38px;

color:#ff8bd8;


text-shadow:

0 0 10px pink,

0 0 30px hotpink;

}



.story{

margin-top:20px;

line-height:1.8;

}



/* Counter */

.love-counter{

margin-top:20px;

}


.counter-box{

display:flex;

justify-content:center;

gap:10px;

margin-top:15px;

}


.counter-box div{

background:#ffffff15;

padding:10px;

border-radius:15px;

}


.counter-box span{

font-size:22px;

color:#ff8bd8;

}



.forever{

margin-top:15px;

color:#ffd6f5;

}



/* Buttons */

button{

margin-top:20px;

padding:13px 25px;

border:none;

border-radius:50px;

background:#ff4da6;

color:white;

font-size:16px;

cursor:pointer;

box-shadow:0 0 25px pink;

}



/* Hearts */

.heart{

position:absolute;

bottom:-20px;

animation:heart 8s linear infinite;

}



@keyframes heart{

from{

transform:translateY(0);

opacity:1;

}

to{

transform:translateY(-110vh);

opacity:0;

}

}



/* Letter */

#letter{

display:none;

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);


width:85%;

max-width:400px;

padding:30px;


background:#1b0028;

border-radius:25px;


box-shadow:0 0 40px pink;

z-index:20;

}


#letter h2{

color:#ff8bd8;

}

</style>


</head>


<body>


<div class="container">


<div class="card">


<div class="profile-circle">
    <img src="couple.png" alt="Couple">
</div>
<img src="couple.png" class="couple-img">


<div class="profile-circle">
❤️
</div>


</div>



<h1>
Phoo Pyae Sone
</h1>



<div class="love-counter">

<h2>
❤️ Together Since ❤️
</h2>


<div class="counter-box">

<div>
<span id="years">0</span>
<p>Days</p>
</div>


<div>
<span id="months">0</span>
<p>Hours</p>
</div>


<div>
<span id="days">0</span>
<p>Minutes</p>
</div>


<div>
<span id="seconds">0</span>
<p>Seconds</p>
</div>


</div>


<p class="forever">
Forever Together ❤️
</p>


</div>



<div class="story">

A beautiful love story ✨

<br><br>

Two hearts, one journey ❤️

<br><br>

Every moment with you
is my favorite memory.

</div>



<button onclick="openLove()">
Open My Love 💌
</button>


<button onclick="toggleMusic()" id="musicBtn">
🎵 Music ON
</button>



<audio id="bgMusic" loop>

<source src="music.mp3" type="audio/mp3">

</audio>



</div>

</div>



<div id="letter">

<h2>
My Love ❤️
</h2>


<p>

<br>

Dear Phoo Pyae Sone,

<br><br>

From 1.2.2023,
our story started.

<br><br>

Forever Together ❤️

</p>


<button onclick="closeLove()">
Close
</button>


</div>



<script>


// Stars

for(let i=0;i<120;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"%";

star.style.top=Math.random()*100+"%";

document.body.appendChild(star);

}



// Hearts

setInterval(()=>{


let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"%";

h.style.fontSize=(15+Math.random()*30)+"px";


document.body.appendChild(h);


setTimeout(()=>{

h.remove();

},9000);


},500);




// Letter

function openLove(){

document.getElementById("letter").style.display="block";

}


function closeLove(){

document.getElementById("letter").style.display="none";

}



// Music

const music=document.getElementById("bgMusic");

let playing=false;


function toggleMusic(){

if(!playing){

music.play();

document.getElementById("musicBtn").innerHTML="🔇 Music OFF";

playing=true;

}else{

music.pause();

document.getElementById("musicBtn").innerHTML="🎵 Music ON";

playing=false;

}

}



</script>


</body>
</html>
